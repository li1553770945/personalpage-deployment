apiVersion: v1
kind: Service
metadata:
  name: personal-page-be-service
spec:
  type: NodePort
  # The cluster is single-node. Preserve public source IPs so direct NodePort
  # traffic cannot masquerade as the trusted local nginx peer.
  externalTrafficPolicy: Local
  selector:
    app: personal-page-be-pod
  ports:
  - protocol: TCP
    port: 9101
    targetPort: 9101
    nodePort: 31902
