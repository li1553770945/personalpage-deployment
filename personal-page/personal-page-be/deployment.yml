apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-page-be-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: personal-page-be-pod
  template:
    metadata:
      labels:
        app: personal-page-be-pod
    spec:
      imagePullSecrets:
      - name: dockerhub-regcred
      - name: ccr-tencent
      containers:
      - name: personal-page-be-container
        image: ccr.ccs.tencentyun.com/littlehorse/personal-page-be:ed916f2641f680a8f3e6539600ae474583ffb12d@sha256:d45676e98a383956d485edcfcfa290493dad9fdd7bbbcdceccf50e1e9a16790b
        imagePullPolicy: IfNotPresent
        env:
        - name: OTEL_SERVICE_NAME
          value: personal-page-be
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otelcol-service.default.svc.cluster.local:4317
        - name: AICHAT_TRUST_PROXY_HEADERS
          value: "true"
        - name: PERSONAL_PAGE_JWT_KEY
          valueFrom:
            secretKeyRef:
              name: jwt-key-secret
              key: JWT_KEY
        volumeMounts:
        - name: config-volume
          mountPath: /app/conf
          readOnly: true
        ports:
        - containerPort: 9101
        livenessProbe:
          httpGet:
            path: /api/ping
            port: 9101
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/ping
            port: 9101
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config-volume
        configMap:
          name: personal-page-be-config
