apiVersion: v1
kind: Secret
metadata:
  name: infisical-secrets
  namespace: infisical
type: Opaque
stringData:
  # Replace these before applying. See README.md for generation commands.
  AUTH_SECRET: CHANGE_ME_GENERATE_WITH_OPENSSL
  ENCRYPTION_KEY: CHANGE_ME_GENERATE_WITH_OPENSSL_16_BYTES_HEX
  SITE_URL: http://localhost:8080
  REDIS_URL: redis://redis-service.default.svc.cluster.local:6379
  DB_CONNECTION_URI: postgresql://infisical:CHANGE_ME_POSTGRES_PASSWORD@postgresql.infisical.svc.cluster.local:5432/infisicalDB
