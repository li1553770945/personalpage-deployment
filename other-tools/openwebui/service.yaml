apiVersion: v1
kind: Service
metadata:
  name: open-webui-service
  namespace: default
  labels:
    app: open-webui
spec:
  selector:
    app: open-webui
  # 考场机器由于在内网环境，你可以直接用 NodePort 暴露服务，方便多台机器直接 IP:Port 访问。
  # 如果你有自己的域名和集群 Ingress 控制器，可以把 type 改为 ClusterIP，然后配置对应的 Ingress。
  type: NodePort
  ports:
    - protocol: TCP
      port: 80         # Service 端口
      targetPort: 8080 # 容器内部端口
      nodePort: 30080  # 考场教师机可以直接访问：http://<K8s任意节点IP>:30080